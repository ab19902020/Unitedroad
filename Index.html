        const timeAgo = (timestamp) => {
            if (!timestamp) return "Recently";
            const date = new Date(timestamp);
            if (isNaN(date.getTime())) return "Recently";
            const diffInSeconds = Math.floor((new Date() - date) / 1000);
            if (diffInSeconds < 3600) { const m = Math.floor(diffInSeconds / 60); return `${m} Min${m !== 1 ? 's' : ''} Ago`; }
            if (diffInSeconds < 86400) { const h = Math.floor(diffInSeconds / 3600); return `${h} Hour${h !== 1 ? 's' : ''} Ago`; }
            const d = Math.floor(diffInSeconds / 86400); return `${d} Day${d !== 1 ? 's' : ''} Ago`;
        };

        const AnimatedCounter = ({ end, suffix = "" }) => {
            const [count, setCount] = useState(0);
            const ref = useRef(null);
            const [hasAnimated, setHasAnimated] = useState(false);
            
            useEffect(() => {
                if (typeof IntersectionObserver === 'undefined') {
                    setCount(end);
                    return;
                }
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting && !hasAnimated) {
                        setHasAnimated(true);
                        let start = 0;
                        const duration = 1600;
                        const increment = Math.ceil(end / 40);
                        const timer = setInterval(() => {
                            start += increment;
                            if (start >= end) { setCount(end); clearInterval(timer); }
                            else setCount(start);
                        }, duration / 40);
                    }
                }, { threshold: 0.6 });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, [end, hasAnimated]);
            
            return <span ref={ref} className="tabular-nums font-heading font-black">{count}{suffix}</span>;
