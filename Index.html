<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>United Road • The Anointed Sound of Old Trafford</title>
    <meta name="description" content="Take Me Home, United Road — The official matchday anthem of Manchester United. Written by the fans, for the fans. Live commentary, chants, videos & the United Oracle.">
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        
        body { margin: 0; padding: 0; background-color: #050505; color: white; overflow-x: hidden; font-family: 'Inter', system_ui, sans-serif; }
        
        .audio-bar { animation: audioBounce 980ms infinite ease-in-out alternate; }
        .paused .audio-bar { animation-play-state: paused !important; height: 5px !important; }
        @keyframes audioBounce { 0% { height: 5px; } 100% { height: 26px; } }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .tabular-nums { font-variant-numeric: tabular-nums; }
        .oracle-scroll::-webkit-scrollbar { width: 6px; }
        .oracle-scroll::-webkit-scrollbar-thumb { background-color: #333; border-radius: 10px; }
        
        /* Premium UI Effects */
        .film-grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;
            background-image: linear-gradient(rgba(255,255,255,0.02) 50%, transparent 50%), linear-gradient(90deg, rgba(255,255,255,0.015) 50%, transparent 50%);
            background-size: 4px 4px, 3px 3px; mix-blend-mode: screen; opacity: 0.6;
        }
        
        .live-dot { animation: livePulse 1.5s infinite ease-in-out; }
        @keyframes livePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .nav-active { color: #DA291C; position: relative; }
        .nav-active::after { content: ''; position: absolute; bottom: -6px; left: 0; width: 100%; height: 2px; background: #DA291C; border-radius: 2px; }
        
        .stadium-bg {
            background-image: linear-gradient(rgba(5,5,5,0.85), rgba(5,5,5,0.95)), url('https://images.unsplash.com/photo-1508344928928-7165b67de128?auto=format&fit=crop&w=2400&q=80');
            background-size: cover; background-position: center 30%; background-attachment: fixed;
        }
        
        .player-card { transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .player-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 30px 70px -15px rgba(218, 41, 28, 0.3); }

        .commentary-line { animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <!-- SAFE AUDIO MOUNT: Completely outside React to guarantee no iframe crashes -->
    <div id="bg-audio" style="display: none; position: absolute; width: 0; height: 0; pointer-events: none;"></div>
    
    <div class="film-grain"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- ICONS ---
        const LucideIcon = ({ d, className = "", ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{d}</svg>
        );

        const Music = (props) => <LucideIcon d={<><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></>} {...props} />;
        const Menu = (props) => <LucideIcon d={<><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></>} {...props} />;
        const X = (props) => <LucideIcon d={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>} {...props} />;
        const Play = (props) => <LucideIcon d={<polygon points="5 3 19 12 5 21 5 3"/>} {...props} />;
        const ChevronRight = (props) => <LucideIcon d={<path d="m9 18 6-6-6-6"/>} {...props} />;
        const Volume2 = (props) => <LucideIcon d={<><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></>} {...props} />;
        const VolumeX = (props) => <LucideIcon d={<><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" x2="17" y1="9" y2="15"/><line x1="17" x2="23" y1="9" y2="15"/></>} {...props} />;
        const Shield = (props) => <LucideIcon d={<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>} {...props} />;
        const Send = (props) => <LucideIcon d={<><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></>} {...props} />;
        const Trophy = (props) => <LucideIcon d={<><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>} {...props} />;
        const Users = (props) => <LucideIcon d={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} {...props} />;
        const Copy = (props) => <LucideIcon d={<><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></>} {...props} />;
        const CheckCircle = (props) => <LucideIcon d={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></>} {...props} />;
        const Flame = (props) => <LucideIcon d={<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>} {...props} />;
        const ExternalLink = (props) => <LucideIcon d={<><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></>} {...props} />;

        const SpotifyIcon = () => <svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.24 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.84.24 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.381 4.26-1.261 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>;
        const YouTubeIcon = () => <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>;
        const FacebookIcon = () => <svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>;
        const InstagramIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>;

        // --- GLOBAL CONSTANTS ---
        const LINKS = {
            spotifyEmbed: "https://open.spotify.com/embed/artist/5QVI0NjbUydubWdYZQJR9z?utm_source=generator&theme=0",
            youtubeUrl: "https://youtube.com/@theunitedroad99",
            youtubeChannelId: "UC6JA4gNGl03w", 
            bgAudioVideoId: "UyWGmCiab3o",
            chantLyrics: `Take me home, United Road\nTo the place, I belong\nTo Old Trafford, to see United\nTake me home, United Road\n\nAll my memories\nOf Bobby Charlton, Georgie Best and Cantona\nTake me home, United Road\nTo the place, I belong`,
        };

        // EXCLUSIVE VERIFIED VIDEO ARCHIVE (NO FAKES)
        const UNITED_ROAD_VIDEOS = [
            { id: "07illo_uJ2g", title: "MAINOO! United Can’t Play Without You (Fan Chant)", thumb: "https://img.youtube.com/vi/07illo_uJ2g/maxresdefault.jpg", date: "Fan Chant" },
            { id: "6JA4gNGl03w", title: "All Bruno Fernandes 21 Assists - United Road Song", thumb: "https://img.youtube.com/vi/6JA4gNGl03w/maxresdefault.jpg", date: "Highlights" },
            { id: "Z4zqOLiijmI", title: "Carricks At The Wheel Again - It's in our DNA", thumb: "https://img.youtube.com/vi/Z4zqOLiijmI/maxresdefault.jpg", date: "Music Video" },
            { id: "UyWGmCiab3o", title: "Take Me Home, United Road - Official Anthem", thumb: "https://img.youtube.com/vi/UyWGmCiab3o/maxresdefault.jpg", date: "Official Anthem" },
        ];

        const FALLBACK_NEWS = [
            { title: "Old Trafford roars as United secure crucial victory", desc: "The atmosphere was electric as the team grabbed all three points in front of the Stretford End.", source: "BBC Sport", date: "Recent", link: "#", img: "https://images.unsplash.com/photo-1508344928928-7165b67de128?auto=format&fit=crop&w=1200&q=80" },
            { title: "United eye summer reinforcements", desc: "The recruitment team is identifying key targets to bolster the squad ahead of the window.", source: "Sky Sports", date: "Recent", link: "#", img: "https://images.unsplash.com/photo-1574629810360-7efbb6b6973f?auto=format&fit=crop&w=1200&q=80" }
        ];

        const LEGACY_STATS = [
            { number: 20, label: "League Titles", sub: "English Record", icon: Trophy },
            { number: 3, label: "European Cups", sub: "'68, '99, '08", icon: Trophy },
            { number: 13, label: "FA Cups", sub: "Domestic Glory", icon: Trophy },
            { number: 1878, label: "Founded", sub: "Newton Heath", icon: Shield },
        ];

        const SUGGESTED_PROMPTS = [
            "Tell me about the 1999 Treble",
            "What's the stadium capacity?",
            "Who is the all time top scorer?",
            "Tell me about club history"
        ];

        const timeAgo = (dateString) => {
            const date = new Date(dateString);
            const diffInSeconds = Math.floor((new Date() - date) / 1000);
            if (diffInSeconds < 3600) { const m = Math.floor(diffInSeconds / 60); return `${m} Min${m !== 1 ? 's' : ''} Ago`; }
            if (diffInSeconds < 86400) { const h = Math.floor(diffInSeconds / 3600); return `${h} Hour${h !== 1 ? 's' : ''} Ago`; }
            const d = Math.floor(diffInSeconds / 86400); return `${d} Day${d !== 1 ? 's' : ''} Ago`;
        };

        const AnimatedCounter = ({ end, suffix = "" }) => {
            const [count, setCount] = useState(0);
            const ref = useRef(null);
            const [hasAnimated, setHasAnimated] = useState(false);
            
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting && !hasAnimated) {
                        setHasAnimated(true);
                        let start = 0;
                        const duration = 1600;
                        const increment = Math.ceil(end / 40);
                        const timer = setInterval(() => {
                            start += increment;
                            if (start >= end) { setCount(end); clearInterval(timer); }
                            else setCount(start);
                        }, duration / 40);
                    }
                }, { threshold: 0.6 });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, [end, hasAnimated]);
            
            return <span ref={ref} className="tabular-nums">{count}{suffix}</span>;
        };

        // --- MAIN APPLICATION ---
        function UnitedRoadAnointed() {
            // ROUTING & GLOBAL STATES
            const [currentPage, setCurrentPage] = useState('home');
            const [hasEntered, setHasEntered] = useState(false);
            const [isNavOpen, setIsNavOpen] = useState(false);
            const [isMuted, setIsMuted] = useState(false);
            const [isPlayingChant, setIsPlayingChant] = useState(false);
            const [currentLyricIndex, setCurrentLyricIndex] = useState(-1);
            const [showConfetti, setShowConfetti] = useState(false);
            const [copied, setCopied] = useState(false);

            // DATA STATES
            const [newsItems, setNewsItems] = useState(FALLBACK_NEWS);
            const [newsLoading, setNewsLoading] = useState(true);
            const [ytVideos, setYtVideos] = useState(UNITED_ROAD_VIDEOS);
            const [activeVideoId, setActiveVideoId] = useState("UyWGmCiab3o");
            const [vaultTab, setVaultTab] = useState('watch');
            
            // ORACLE STATE
            const [oracleInput, setOracleInput] = useState('');
            const [isOracleThinking, setIsOracleThinking] = useState(false);
            const [chatHistory, setChatHistory] = useState([
                { role: 'oracle', text: "I am the United Oracle. Ask me about the Treble, our legends, or our rich history." }
            ]);

            const playerRef = useRef(null);
            const audioBarsRef = useRef(null);
            const chatEndRef = useRef(null);
            const lyricIntervalRef = useRef(null);

            const socialLinks = [
                { href: LINKS.spotify, icon: <SpotifyIcon /> },
                { href: LINKS.youtubeUrl, icon: <YouTubeIcon /> },
                { href: LINKS.instagram, icon: <InstagramIcon /> },
            ];

            const chantLines = LINKS.chantLyrics.split('\n').filter(line => line.trim());

            // --- MULTI-SOURCE REAL NEWS FETCH (BBC + SKY + STRICT MAN UTD FILTER) ---
            useEffect(() => {
                const fetchNews = async () => {
                    try {
                        const bbcRes = await fetch('https://api.rss2json.com/v1/api.json?rss_url=http://feeds.bbci.co.uk/sport/football/teams/manchester-united/rss.xml');
                        const bbcData = await bbcRes.json();
                        
                        // 11065 is the strict Sky Sports Manchester United feed
                        const skyRes = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.skysports.com/rss/11065');
                        const skyData = await skyRes.json();

                        let combined = [];
                        
                        if (bbcData.status === 'ok' && bbcData.items) {
                            combined = [...combined, ...bbcData.items.map(item => ({...item, sourceName: 'BBC Sport'}))];
                        }
                        if (skyData.status === 'ok' && skyData.items) {
                            combined = [...combined, ...skyData.items.map(item => ({...item, sourceName: 'Sky Sports'}))];
                        }

                        // BULLETPROOF FILTER: Absolute guarantee no French Open or Golf gets through
                        combined = combined.filter(item => {
                            const text = (item.title + " " + item.description).toLowerCase();
                            
                            // Must contain at least one United keyword
                            const unitedKeywords = ['manchester united', 'man utd', 'mufc', 'united', 'old trafford', 'red devils', 'carrington', 'bruno', 'mainoo', 'garnacho', 'rashford', 'hojlund', 'onana', 'martinez', 'shaw', 'dalot', 'casemiro', 'manager', 'premier league', 'fa cup', 'transfer'];
                            
                            // Must NOT contain any non-football/generic sports keywords
                            const nonFootballKeywords = ['french open', 'wimbledon', 'f1', 'formula 1', 'golf', 'cricket', 'rugby', 'tennis', 'nfl', 'nba', 'boxing', 'verstappen', 'hamilton', 'alcaraz', 'djokovic', 'mcilroy'];
                            
                            const isUnitedRelated = unitedKeywords.some(kw => text.includes(kw));
                            const isUnrelatedSport = nonFootballKeywords.some(kw => text.includes(kw));
                            
                            return isUnitedRelated && !isUnrelatedSport;
                        });

                        if (combined.length > 0) {
                            // Sort by newest first
                            combined.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
                            
                            const premiumImages = [
                                "https://images.unsplash.com/photo-1508344928928-7165b67de128?auto=format&fit=crop&w=1200&q=80",
                                "https://images.unsplash.com/photo-1574629810360-7efbb6b6973f?auto=format&fit=crop&w=1200&q=80"
                            ];
                            
                            const formatted = combined.slice(0, 6).map((item, i) => ({
                                title: item.title, 
                                desc: item.description.replace(/<[^>]+>/g, "").slice(0, 120) + "...",
                                source: item.sourceName, 
                                date: timeAgo(item.pubDate), 
                                link: item.link,
                                img: item.thumbnail || (item.enclosure && item.enclosure.link) || premiumImages[i % premiumImages.length]
                            }));
                            setNewsItems(formatted);
                        } else {
                            setNewsItems(FALLBACK_NEWS);
                        }
                    } catch (error) {
                        console.log("News fetch failed, using fallback.");
                        setNewsItems(FALLBACK_NEWS);
                    } finally {
                        setNewsLoading(false);
                    }
                };

                fetchNews();
            }, []);

            // --- YOUTUBE FETCH ---
            useEffect(() => {
                fetch(`https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.youtube.com%2Ffeeds%2Fvideos.xml%3Fchannel_id%3D${LINKS.youtubeChannelId}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'ok' && data.items && data.items.length > 0) {
                            const liveVideos = data.items.map(item => {
                                const id = item.link.split('v=')[1] || item.guid.split(':')[2];
                                return { id, title: item.title, thumb: `https://img.youtube.com/vi/${id}/mqdefault.jpg`, date: "New" };
                            });
                            const combined = [...liveVideos, ...UNITED_ROAD_VIDEOS];
                            const unique = Array.from(new Map(combined.map(v => [v.id, v])).values());
                            setYtVideos(unique);
                        }
                    }).catch(() => console.log("YT fetch failed. Only showing verified videos."));
            }, []);

            // --- TWITTER WIDGET LOADER ---
            useEffect(() => {
                if (currentPage === 'hub') {
                    if (window.twttr && window.twttr.widgets) {
                        window.twttr.widgets.load();
                    } else {
                        const script = document.createElement("script");
                        script.src = "https://platform.twitter.com/widgets.js";
                        script.async = true;
                        document.body.appendChild(script);
                    }
                }
            }, [currentPage]);

            // --- AUDIO INIT ---
            useEffect(() => {
                const loadYT = () => {
                    if (window.YT) { initPlayer(); return; }
                    const tag = document.createElement('script');
                    tag.src = "https://www.youtube.com/iframe_api";
                    document.body.appendChild(tag);
                    window.onYouTubeIframeAPIReady = initPlayer;
                };
                
                const initPlayer = () => {
                    if (playerRef.current) return;
                    playerRef.current = new window.YT.Player('bg-audio', {
                        height: '0', width: '0', videoId: LINKS.bgAudioVideoId,
                        playerVars: { autoplay: 0, controls: 0, playsinline: 1, modestbranding: 1, loop: 1 },
                        events: {
                            onStateChange: (e) => {
                                const playing = e.data === window.YT.PlayerState.PLAYING;
                                if (audioBarsRef.current) audioBarsRef.current.classList.toggle('paused', !playing);
                                if (!playing) setIsPlayingChant(false);
                            }
                        }
                    });
                };
                loadYT();
            }, []);

            // --- LYRIC SYNC ---
            useEffect(() => {
                if (isPlayingChant) {
                    setCurrentLyricIndex(0);
                    let idx = 0;
                    lyricIntervalRef.current = setInterval(() => {
                        idx = (idx + 1) % chantLines.length;
                        setCurrentLyricIndex(idx);
                    }, 3800);
                } else {
                    setCurrentLyricIndex(-1);
                    if (lyricIntervalRef.current) clearInterval(lyricIntervalRef.current);
                }
                return () => clearInterval(lyricIntervalRef.current);
            }, [isPlayingChant]);

            // --- ORACLE SCROLL ---
            useEffect(() => { 
                if (chatHistory.length > 1 || isOracleThinking) {
                    if(chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: "smooth", block: "nearest" }); 
                }
            }, [chatHistory, isOracleThinking]);

            const triggerConfetti = () => { setShowConfetti(true); setTimeout(() => setShowConfetti(false), 2200); };
            
            const handleEnter = () => {
                setHasEntered(true);
                triggerConfetti();
                setTimeout(() => {
                    try {
                        if (playerRef.current && typeof playerRef.current.playVideo === 'function') {
                            playerRef.current.playVideo();
                            playerRef.current.setVolume(75);
                            setIsMuted(false);
                        }
                    } catch (e) { console.log(e); }
                }, 600);
            };

            const toggleMute = () => {
                if (!playerRef.current || typeof playerRef.current.playVideo !== 'function') return;
                if (isMuted) { playerRef.current.unMute(); playerRef.current.playVideo(); setIsMuted(false); } 
                else { playerRef.current.pauseVideo(); setIsMuted(true); setIsPlayingChant(false); }
            };

            const toggleChantMode = () => {
                if (!playerRef.current || typeof playerRef.current.playVideo !== 'function') return;
                if (isPlayingChant) { playerRef.current.pauseVideo(); setIsPlayingChant(false); } 
                else { playerRef.current.playVideo(); playerRef.current.setVolume(90); setIsMuted(false); setIsPlayingChant(true); }
            };

            const handleCopy = () => {
                try {
                    const textArea = document.createElement("textarea");
                    textArea.value = LINKS.chantLyrics;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand("copy");
                    document.body.removeChild(textArea);
                    setCopied(true);
                    triggerConfetti();

                    <AnimatePresence>

                                    <div className="bg-[#111] border border-[#FFD700]/30 text-[#FFD700] px-6 py-2.5 text-xs font-black tracking-[4px] uppercase mb-12 shadow-lg -skew-x-12">THE ANOINTED SOUND OF OLD TRAFFORD</div>
                                    <button onClick={handleEnter} className="px-14 py-6 bg-[#DA291C] text-white font-black text-sm tracking-[3px] uppercase rounded-xl hover:bg-red-700 transition-all shadow-[0_0_30px_rgba(218,41,28,0.5)] border border-red-500 flex items-center gap-3">ENTER THE THEATRE <ChevronRight className="w-5 h-5"/></button>

                                        {id:'hub',label:'SOCIAL HUB'},

                    {hasEntered && (

                                <div className="md:col-span-5">

                                    <p className="text-white/50 text-sm max-w-sm mb-6">The official home of Manchester United’s matchday anthem. Built for the faithful.</p>
                                    <div className="flex gap-3">

                                    </div>

                                    <div className="text-[#FFD700] text-xs font-black tracking-[3px] mb-6">THE ANOINTED FAITHFUL • 267,841 STRONG</div>
                                    <div className="text-white/30 text-[10px] tracking-widest font-bold">© {new Date().getFullYear()} UNITED ROAD • MANCHESTER • GLORY GLORY</div>
                                </div>
                            </div>
                        </footer>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<UnitedRoadAnointed />);
    </script>
